<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 管理台</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Microsoft YaHei', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
        a { color: inherit; text-decoration: none; }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .brand .pill {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(102, 126, 234, 0.18);
            border: 1px solid rgba(102, 126, 234, 0.35);
            color: #b6c3ff;
        }
        .nav {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: #e2e8f0;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s ease;
        }
        .btn:hover {
            background: rgba(255,255,255,0.10);
            border-color: rgba(102, 126, 234, 0.55);
        }
        .btn.primary {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.95), rgba(118, 75, 162, 0.95));
            border-color: rgba(255,255,255,0.0);
        }
        .btn.primary:hover { filter: brightness(1.05); }
        .btn.danger:hover { border-color: rgba(255, 80, 80, 0.8); color: #ffb2b2; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .container {
            padding: 18px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 16px;
        }
        @media (max-width: 1100px) {
            .grid { grid-template-columns: 1fr; }
        }

        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 14px;
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #cbd5e1;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat {
            padding: 12px;
            border-radius: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .stat .label { font-size: 12px; color: #94a3b8; }
        .stat .value { font-size: 22px; font-weight: 800; margin-top: 6px; }

        .muted { color: #94a3b8; font-size: 12px; }
        .error {
            color: #fecaca;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 12px;
            display: none;
            white-space: pre-wrap;
        }

        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: #e2e8f0;
            outline: none;
        }
        .input:focus { border-color: rgba(102, 126, 234, 0.7); }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        thead {
            background: rgba(255,255,255,0.05);
        }
        th, td {
            padding: 10px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-size: 13px;
            vertical-align: top;
        }
        th { color: #cbd5e1; text-align: left; font-weight: 700; }
        tr:hover td { background: rgba(255,255,255,0.03); }
        .cell-title { font-weight: 700; color: #e2e8f0; }
        .cell-sub { color: #94a3b8; font-size: 12px; margin-top: 4px; }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: #cbd5e1;
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .result {
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 12px;
        }
        .result .head {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        .result .title { font-weight: 800; }
        .result .meta { color: #94a3b8; font-size: 12px; }
        .result pre {
            margin: 10px 0 0 0;
            white-space: pre-wrap;
            word-break: break-word;
            background: rgba(15,23,42,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 10px;
            color: #cbd5e1;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="topbar">
        <div class="brand">
            <div>RAG 管理台</div>
            <span class="pill" id="indexStatePill">未加载</span>
        </div>
        <div class="nav">
            <span class="muted">开发模式（无登录）</span>
            <a class="btn" href="/api/chat-page/">进入对话</a>
            <button class="btn" id="btnImport" onclick="goToImport()">导入知识</button>
            <button class="btn" id="btnReindex" onclick="reindexNow()">重建索引</button>
        </div>
    </div>

    <div class="container">
        <div class="grid">

            <div>
                <div class="card" style="margin-bottom: 16px;">
                    <h3>概览</h3>
                    <div class="stats">
                        <div class="stat">
                            <div class="label">总知识数</div>
                            <div class="value" id="statTotal">-</div>
                        </div>
                        <div class="stat">
                            <div class="label">已入索引</div>
                            <div class="value" id="statIndexed">-</div>
                        </div>
                        <div class="stat">
                            <div class="label">未入索引</div>
                            <div class="value" id="statUnindexed">-</div>
                        </div>
                        <div class="stat">
                            <div class="label">Embedding 就绪</div>
                            <div class="value" id="statEmbReady">-</div>
                        </div>
                    </div>
                    <div class="error" id="modelErrorBox" style="margin-top: 10px;"></div>
                    <div class="muted" style="margin-top: 10px;">提示：已处理/未处理按“是否入索引”划分。检索仅使用已入索引的知识。</div>
                </div>

                <div class="card" style="margin-bottom: 16px;">
                    <h3>可视化</h3>
                    <canvas id="chartIndexed" height="160"></canvas>
                    <div style="height: 10px;"></div>
                    <canvas id="chartCategory" height="200"></canvas>
                </div>

                <div class="card">
                    <h3>检索验证</h3>
                    <div class="row">
                        <input class="input" id="queryInput" placeholder="输入问题，例如：梵宫有什么看点？" onkeydown="if(event.key==='Enter') runSearch()">
                    </div>
                    <div class="row" style="margin-top: 10px;">
                        <input class="input" id="topKInput" type="number" min="1" max="20" value="5" style="max-width: 140px;">
                        <button class="btn primary" id="btnSearch" onclick="runSearch()">检索</button>
                    </div>
                    <div class="muted" style="margin-top: 10px;">返回结果包含 `score/source_type`，以及可能的 `retrieval_score/rerank_score`。</div>
                    <div style="margin-top: 12px;" class="results" id="searchResults"></div>
                </div>
            </div>

            <div>
                <div class="card" style="margin-bottom: 16px;">
                    <h3>已入索引知识</h3>
                    <div class="row" style="margin-bottom: 10px;">
                        <input class="input" id="qIndexed" placeholder="搜索标题/正文" onkeydown="if(event.key==='Enter') loadKnowledge(true)">
                        <button class="btn" onclick="loadKnowledge(true)">刷新</button>
                        <button class="btn" id="btnRemoveFromIndex" style="display:none;" onclick="setIndexed(false)">移出索引</button>
                    </div>
                    <div style="overflow:auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:34px;"><input type="checkbox" id="chkIndexedAll" onclick="toggleAll(true, this.checked)"></th>
                                    <th>标题</th>
                                    <th style="width:120px;">分类</th>
                                    <th style="width:140px;">创建时间</th>
                                </tr>
                            </thead>
                            <tbody id="tbodyIndexed"></tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <h3>未入索引知识</h3>
                    <div class="row" style="margin-bottom: 10px;">
                        <input class="input" id="qUnindexed" placeholder="搜索标题/正文" onkeydown="if(event.key==='Enter') loadKnowledge(false)">
                        <button class="btn" onclick="loadKnowledge(false)">刷新</button>
                        <button class="btn primary" id="btnAddToIndex" style="display:none;" onclick="setIndexed(true)">入索引</button>
                    </div>
                    <div style="overflow:auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:34px;"><input type="checkbox" id="chkUnindexedAll" onclick="toggleAll(false, this.checked)"></th>
                                    <th>标题</th>
                                    <th style="width:120px;">分类</th>
                                    <th style="width:140px;">创建时间</th>
                                </tr>
                            </thead>
                            <tbody id="tbodyUnindexed"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        // Development mode: no login/token required.
        let accessToken = null;
        let refreshToken = null;
        let canEdit = true;

        let chartIndexed = null;
        let chartCategory = null;

        function authHeaders() {
            return {
                'Content-Type': 'application/json'
            };
        }

        async function fetchJson(url, options = {}) {
            const response = await fetch(url, options);
            let json = null;
            try {
                json = await response.json();
            } catch (e) {
                json = null;
            }
            return { response, json };
        }

        async function refreshAccessToken() { return false; }

        function goToImport() {
            window.location.href = '/api/upload-word/';
        }

        async function initUser() { return; }

        function setIndexPill(state) {
            const el = document.getElementById('indexStatePill');
            el.textContent = state.text;
            el.style.background = state.bg;
            el.style.borderColor = state.border;
            el.style.color = state.color;
        }

        function renderCharts(status) {
            const indexed = status.indexed;
            const unindexed = status.unindexed;

            const ctx1 = document.getElementById('chartIndexed');
            if (chartIndexed) chartIndexed.destroy();
            chartIndexed = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: ['已入索引', '未入索引'],
                    datasets: [{
                        data: [indexed, unindexed],
                        backgroundColor: ['rgba(102, 126, 234, 0.85)', 'rgba(148, 163, 184, 0.35)'],
                        borderColor: ['rgba(102, 126, 234, 1)', 'rgba(148, 163, 184, 0.6)'],
                        borderWidth: 1,
                    }]
                },
                options: {
                    plugins: {
                        legend: { labels: { color: '#cbd5e1' } }
                    }
                }
            });

            const categoryMap = new Map();
            for (const row of status.category_counts || []) {
                categoryMap.set(row.category, row.count);
            }
            const labels = Array.from(categoryMap.keys());
            const values = Array.from(categoryMap.values());

            const ctx2 = document.getElementById('chartCategory');
            if (chartCategory) chartCategory.destroy();
            chartCategory = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: '知识数',
                        data: values,
                        backgroundColor: 'rgba(102, 126, 234, 0.55)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 1,
                    }]
                },
                options: {
                    scales: {
                        x: { ticks: { color: '#cbd5e1' }, grid: { color: 'rgba(255,255,255,0.06)' } },
                        y: { ticks: { color: '#cbd5e1' }, grid: { color: 'rgba(255,255,255,0.06)' } },
                    },
                    plugins: {
                        legend: { labels: { color: '#cbd5e1' } }
                    }
                }
            });
        }

        async function loadStatus() {
            const { response, json } = await fetchJson(API_BASE + '/rag/index-status/', {
                method: 'GET',
                headers: {}
            });
            if (!response.ok || json.code !== 200) {
                console.error('加载状态失败', json);
                return;
            }

            const data = json.data;
            document.getElementById('statTotal').textContent = data.total;
            document.getElementById('statIndexed').textContent = data.indexed;
            document.getElementById('statUnindexed').textContent = data.unindexed;
            document.getElementById('statEmbReady').textContent = data.vector_index.embeddings_ready ? '是' : '否';

            const errorBox = document.getElementById('modelErrorBox');
            if (data.vector_index.model_error) {
                errorBox.style.display = 'block';
                errorBox.textContent = '模型/索引错误：\n' + data.vector_index.model_error;
            } else {
                errorBox.style.display = 'none';
                errorBox.textContent = '';
            }

            if (data.vector_index.dirty) {
                setIndexPill({ text: '索引待更新', bg: 'rgba(245, 158, 11, 0.12)', border: 'rgba(245, 158, 11, 0.25)', color: '#fde68a' });
            } else if (data.vector_index.embeddings_ready) {
                setIndexPill({ text: 'Embedding 已就绪', bg: 'rgba(34, 197, 94, 0.12)', border: 'rgba(34, 197, 94, 0.25)', color: '#bbf7d0' });
            } else if (data.vector_index.index_ready) {
                setIndexPill({ text: '索引已构建(无向量)', bg: 'rgba(245, 158, 11, 0.12)', border: 'rgba(245, 158, 11, 0.25)', color: '#fde68a' });
            } else {
                setIndexPill({ text: '索引未构建', bg: 'rgba(148, 163, 184, 0.12)', border: 'rgba(148, 163, 184, 0.25)', color: '#cbd5e1' });
            }

            renderCharts(data);
        }

        async function loadKnowledge(isIndexed) {
            const q = (document.getElementById(isIndexed ? 'qIndexed' : 'qUnindexed').value || '').trim();
            const url = new URL(API_BASE + '/knowledge/', window.location.origin);
            url.searchParams.set('is_indexed', isIndexed ? 'true' : 'false');
            if (q) url.searchParams.set('q', q);

            const { response, json } = await fetchJson(url.toString(), {
                method: 'GET',
                headers: {}
            });
            if (!response.ok) {
                console.error('加载知识失败', json);
                return;
            }

            const rows = Array.isArray(json) ? json : (json.results || []);
            const tbody = document.getElementById(isIndexed ? 'tbodyIndexed' : 'tbodyUnindexed');
            tbody.innerHTML = '';
            for (const item of rows) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input type="checkbox" class="chkRow" data-id="${item.id}" data-indexed="${isIndexed ? '1' : '0'}"></td>
                    <td>
                        <div class="cell-title">${escapeHtml(item.title || '')}</div>
                        <div class="cell-sub">${escapeHtml((item.content || '').slice(0, 120))}${(item.content || '').length > 120 ? '…' : ''}</div>
                    </td>
                    <td><span class="tag">${escapeHtml(item.category || '-') }</span></td>
                    <td class="muted">${escapeHtml(formatDate(item.created_at))}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        function toggleAll(isIndexed, checked) {
            const tbody = document.getElementById(isIndexed ? 'tbodyIndexed' : 'tbodyUnindexed');
            for (const chk of tbody.querySelectorAll('input.chkRow')) {
                chk.checked = checked;
            }
        }

        function selectedIds(targetIndexed) {
            const tbody = document.getElementById(targetIndexed ? 'tbodyIndexed' : 'tbodyUnindexed');
            const ids = [];
            for (const chk of tbody.querySelectorAll('input.chkRow')) {
                if (chk.checked) ids.push(parseInt(chk.dataset.id, 10));
            }
            return ids;
        }

        async function setIndexed(toIndexed) {
            if (!canEdit) return;
            const ids = selectedIds(!toIndexed);
            if (!ids.length) return;

            const btn = document.getElementById(toIndexed ? 'btnAddToIndex' : 'btnRemoveFromIndex');
            btn.disabled = true;
            try {
                const { response, json } = await fetchJson(API_BASE + '/rag/set-indexed/', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ ids, is_indexed: toIndexed })
                });
                if (!response.ok || json.code !== 200) {
                    console.error('设置索引失败', json);
                    return;
                }
                document.getElementById('chkIndexedAll').checked = false;
                document.getElementById('chkUnindexedAll').checked = false;
                await Promise.all([loadStatus(), loadKnowledge(true), loadKnowledge(false)]);
            } finally {
                btn.disabled = false;
            }
        }

        async function reindexNow() {
            if (!canEdit) return;
            const btn = document.getElementById('btnReindex');
            btn.disabled = true;
            try {
                const { response, json } = await fetchJson(API_BASE + '/rag/reindex/', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({})
                });
                if (!response.ok || json.code !== 200) {
                    console.error('重建索引失败', json);
                    return;
                }
                await loadStatus();
            } finally {
                btn.disabled = false;
            }
        }

        async function runSearch() {
            const query = (document.getElementById('queryInput').value || '').trim();
            const topK = parseInt(document.getElementById('topKInput').value || '5', 10);
            if (!query) return;

            const btn = document.getElementById('btnSearch');
            btn.disabled = true;
            try {
                const url = new URL(API_BASE + '/rag/search/', window.location.origin);
                url.searchParams.set('query', query);
                url.searchParams.set('top_k', String(isNaN(topK) ? 5 : topK));

                const { response, json } = await fetchJson(url.toString(), {
                    method: 'GET',
                    headers: {}
                });
                if (!response.ok || json.code !== 200) {
                    console.error('检索失败', json);
                    return;
                }
                renderSearchResults(json.data || []);
            } finally {
                btn.disabled = false;
            }
        }

        function renderSearchResults(items) {
            const container = document.getElementById('searchResults');
            container.innerHTML = '';
            if (!items.length) {
                container.innerHTML = '<div class="muted">无结果（仅检索已入索引知识；模型不可用时会回退关键词）</div>';
                return;
            }
            let rank = 1;
            for (const item of items) {
                const div = document.createElement('div');
                div.className = 'result';
                const metaParts = [];
                metaParts.push('source_type=' + (item.source_type || '-'));
                metaParts.push('score=' + (typeof item.score === 'number' ? item.score.toFixed(4) : item.score));
                if (typeof item.retrieval_score === 'number') metaParts.push('retrieval=' + item.retrieval_score.toFixed(4));
                if (typeof item.rerank_score === 'number') metaParts.push('rerank=' + item.rerank_score.toFixed(4));
                div.innerHTML = `
                    <div class="head">
                        <div>
                            <div class="title">#${rank} ${escapeHtml(item.title || '')}</div>
                            <div class="meta">${escapeHtml(metaParts.join(' | '))}</div>
                        </div>
                        <div><span class="tag">${escapeHtml(item.category || '-') }</span></div>
                    </div>
                    <pre>${escapeHtml(item.content || '')}</pre>
                `;
                container.appendChild(div);
                rank += 1;
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function formatDate(iso) {
            if (!iso) return '-';
            const d = new Date(iso);
            if (isNaN(d.getTime())) return String(iso);
            const pad = (n) => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        (async function bootstrap() {
            await initUser();
            await Promise.all([loadStatus(), loadKnowledge(true), loadKnowledge(false)]);
        })();
    </script>
</body>
</html>
