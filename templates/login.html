<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>景区导览系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            width: 420px;
            max-width: 90vw;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #888;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            background: #fafafa;
        }

        .form-group input:focus {
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .switch-link {
            text-align: center;
            margin-top: 25px;
            color: #888;
            font-size: 14px;
        }

        .switch-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }

        .message-box {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message-error {
            background: #fff0f0;
            color: #e74c3c;
            border: 1px solid #ffd5d5;
            display: block;
        }

        .message-success {
            background: #f0fff4;
            color: #27ae60;
            border: 1px solid #c8f7d5;
            display: block;
        }

        .user-info-box {
            background: #f0f4ff;
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 30px;
            display: none;
            font-size: 14px;
            color: #444;
        }

        .user-info-box strong {
            color: #667eea;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h1 id="form-title">景区导览系统</h1>
            <p id="form-subtitle">登录以继续</p>
        </div>

        <div id="messageBox" class="message-box"></div>

        <form id="authForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>

            <div class="form-group" id="emailGroup" style="display: none;">
                <label for="email">邮箱（选填）</label>
                <input type="email" id="email" placeholder="请输入邮箱" autocomplete="email">
            </div>

            <button type="submit" class="btn-login" id="submitBtn">登 录</button>
        </form>

        <div class="switch-link">
            <span id="switchText">还没有账号？</span>
            <a id="switchLink" onclick="toggleMode()">立即注册</a>
        </div>

        <div class="user-info-box" id="userInfoBox"></div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        let isLoginMode = true;
        let accessToken = null;
        let refreshToken = null;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('form-title').textContent = isLoginMode ? '景区导览系统' : '注册新账号';
            document.getElementById('form-subtitle').textContent = isLoginMode ? '登录以继续' : '创建您的账号';
            document.getElementById('submitBtn').textContent = isLoginMode ? '登 录' : '注 册';
            document.getElementById('emailGroup').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('switchText').textContent = isLoginMode ? '还没有账号？' : '已有账号？';
            document.getElementById('switchLink').textContent = isLoginMode ? '立即注册' : '去登录';
            clearMessage();
        }

        function showMessage(msg, type) {
            const box = document.getElementById('messageBox');
            box.textContent = msg;
            box.className = 'message-box message-' + type;
        }

        function clearMessage() {
            const box = document.getElementById('messageBox');
            box.className = 'message-box';
            box.textContent = '';
        }

        function showUserInfo(username) {
            const box = document.getElementById('userInfoBox');
            box.innerHTML = '当前登录用户：<strong>' + username + '</strong>';
            box.style.display = 'block';
			setTimeout(() => {
			        window.location.href = '/api/chat-page/';
			    }, 800);
        }

        document.getElementById('authForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearMessage();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!username || !password) {
                showMessage('用户名和密码不能为空', 'error');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '处理中...';

            try {
                let url, body;

                if (isLoginMode) {
                    url = API_BASE + '/login/';
                    body = { username, password };
                } else {
                    url = API_BASE + '/register/';
                    body = { username, password, password_confirm: password, email };
                }

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const result = await response.json();

                if (response.ok && result.code === 200) {
                    accessToken = result.data.access;
                    refreshToken = result.data.refresh;
                    showMessage(result.message, 'success');
                    showUserInfo(result.data.username);

                    localStorage.setItem('access_token', accessToken);
                    localStorage.setItem('refresh_token', refreshToken);
                    localStorage.setItem('username', result.data.username);

                    if (!isLoginMode) {
                        setTimeout(() => {
                            toggleMode();
                            clearMessage();
                        }, 1500);
                    }
                } else {
                    const errMsg = typeof result.message === 'object'
                        ? JSON.stringify(result.message)
                        : (result.message || '请求失败');
                    showMessage(errMsg, 'error');
                }
            } catch (error) {
                showMessage('网络错误：无法连接到服务器，请确认后端已启动', 'error');
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.textContent = isLoginMode ? '登 录' : '注 册';
            }
        });

        window.addEventListener('load', function() {
            const savedToken = localStorage.getItem('access_token');
            const savedUsername = localStorage.getItem('username');
            if (savedToken && savedUsername) {
                accessToken = savedToken;
                refreshToken = localStorage.getItem('refresh_token');
                showUserInfo(savedUsername);
            }
        });
    </script>

</body>
</html>
