<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>景区导览 AI 数字人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
			.btn-import {
			    padding: 8px 20px;
			    background: rgba(102, 126, 234, 0.2);
			    color: #7c83ff;
			    border: 1px solid rgba(102, 126, 234, 0.4);
			    border-radius: 8px;
			    cursor: pointer;
			    font-size: 13px;
			    transition: all 0.2s;
			    margin-right: 10px;
			}
			
			.btn-import:hover {
			    background: rgba(102, 126, 234, 0.35);
			    border-color: #7c83ff;
			}
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-container {
            width: 900px;
            max-width: 95vw;
            height: 90vh;
            background: #16213e;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .top-bar .user-info {
            color: #a0a8c0;
            font-size: 14px;
        }

        .top-bar .user-info strong {
            color: #7c83ff;
        }

        .btn-logout {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.08);
            color: #a0a8c0;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(255, 80, 80, 0.2);
            border-color: #ff5050;
            color: #ff5050;
        }

        .digital-human-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .avatar-container {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 0 60px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s;
            position: relative;
        }

        .avatar-container.speaking {
            animation: pulse 0.6s infinite alternate;
        }

        @keyframes pulse {
            from { box-shadow: 0 0 40px rgba(102, 126, 234, 0.3); }
            to { box-shadow: 0 0 80px rgba(102, 126, 234, 0.7); }
        }

        .avatar-face {
            font-size: 80px;
            user-select: none;
        }

        .avatar-status {
            color: #7cff7c;
            font-size: 13px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #7cff7c;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .emotion-label {
            color: #a0a8c0;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 20px;
        }

        .chat-area {
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 24px;
        }

        .message-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 16px;
            padding-right: 8px;
        }

        .message-list::-webkit-scrollbar {
            width: 4px;
        }

        .message-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        .message-item {
            margin-bottom: 12px;
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-item.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message-item.ai .message-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .message-item.user .message-avatar {
            background: #3a3f5c;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            color: #e0e4f0;
        }

        .message-item.ai .message-bubble {
            background: rgba(102, 126, 234, 0.2);
            border-top-left-radius: 4px;
        }

        .message-item.user .message-bubble {
            background: rgba(255, 255, 255, 0.08);
            border-top-right-radius: 4px;
        }

        .input-area {
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            color: #e0e4f0;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .input-area input::placeholder {
            color: #5a6080;
        }

        .btn-send {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            white-space: nowrap;
        }

        .btn-send:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="top-bar">
            <span class="user-info">欢迎，<strong id="displayName">游客</strong></span>
            <div>
                <button class="btn-import" id="btnImport" onclick="goToImport()" style="display:none;">📄 导入文档</button>
                <button class="btn-logout" onclick="handleLogout()">退出登录</button>
            </div>
        </div>

        <div class="digital-human-area">
            <div class="avatar-container" id="avatarContainer">
                <span class="avatar-face">🧑‍💼</span>
            </div>
            <div class="avatar-status" id="avatarStatus">
                <span class="status-dot"></span> 在线
            </div>
            <div class="emotion-label" id="emotionLabel">微笑</div>
        </div>

        <div class="chat-area">
            <div class="message-list" id="messageList"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="输入您的问题，如：迎客松在哪里？" onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="btn-send" id="sendBtn" onclick="sendMessage()">发 送</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        let accessToken = localStorage.getItem('access_token');
        let refreshToken = localStorage.getItem('refresh_token');
        let username = localStorage.getItem('username');
        let sessionId = 'session_' + Date.now();

        const emotionMap = {
            'smile': '微笑 😊',
            'neutral': '平静 😐',
            'surprise': '惊讶 😮',
            'sad': '难过 😢',
            'explain': '讲解中 📖'
        };

        const avatarEmojiMap = {
            'smile': '😊',
            'neutral': '😐',
            'surprise': '😮',
            'sad': '😢',
            'explain': '🗣️'
        };

        function checkAuth() {
            if (!accessToken || !username) {
                window.location.href = '/api/login-page/';
                return;
            }
            document.getElementById('displayName').textContent = username;
            checkIfAdmin();  // ← 加这一行
        }

        function handleLogout() {
            fetch(API_BASE + '/logout/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + accessToken
                },
                body: JSON.stringify({ refresh: refreshToken })
            }).finally(() => {
                localStorage.clear();
                window.location.href = '/api/login-page/';
            });
        }

        function addMessage(role, text) {
            const list = document.getElementById('messageList');
            const item = document.createElement('div');
            item.className = 'message-item ' + role;
            item.innerHTML = `
                <div class="message-avatar">${role === 'ai' ? '🧑‍💼' : '👤'}</div>
                <div class="message-bubble">${text}</div>
            `;
            list.appendChild(item);
            list.scrollTop = list.scrollHeight;
        }

        function updateDigitalHuman(emotion, action) {
            const container = document.getElementById('avatarContainer');
            const emotionLabel = document.getElementById('emotionLabel');
            const avatarFace = container.querySelector('.avatar-face');

            container.classList.add('speaking');
            setTimeout(() => container.classList.remove('speaking'), 2000);

            const emoji = avatarEmojiMap[emotion] || '😊';
            avatarFace.textContent = emoji;
            emotionLabel.textContent = emotionMap[emotion] || emotion;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = '...';

            addMessage('user', message);
            input.value = '';

            const statusEl = document.getElementById('avatarStatus');
            statusEl.innerHTML = '<span class="status-dot"></span> 思考中...';

            try {
                const response = await fetch(API_BASE + '/chat/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + accessToken
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                if (response.status === 401) {
                    const refreshed = await refreshAccessToken();
                    if (refreshed) {
                        btn.disabled = false;
                        btn.textContent = '发 送';
                        return sendMessage();
                    } else {
                        window.location.href = '/api/login-page/';
                        return;
                    }
                }

                const result = await response.json();
                if (result.code === 200) {
                    addMessage('ai', result.data.response_text);
                    updateDigitalHuman(result.data.emotion, result.data.action);
                } else {
                    addMessage('ai', '抱歉，我暂时无法回答这个问题。');
                }
            } catch (error) {
                addMessage('ai', '网络错误，请检查后端服务是否启动。');
                console.error(error);
            } finally {
                statusEl.innerHTML = '<span class="status-dot"></span> 在线';
                btn.disabled = false;
                btn.textContent = '发 送';
            }
        }

        async function refreshAccessToken() {
            try {
                const response = await fetch(API_BASE + '/refresh/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh: refreshToken })
                });
                const result = await response.json();
                if (result.code === 200) {
                    accessToken = result.data.access;
                    localStorage.setItem('access_token', accessToken);
                    return true;
                }
            } catch (e) {
                console.error('Token 刷新失败', e);
            }
            return false;
        }
		function goToImport() {
		    const token = localStorage.getItem('access_token');
		    window.location.href = '/api/upload-word/?token=' + token;
		}
		
		async function checkIfAdmin() {
		    try {
		        const response = await fetch(API_BASE + '/user-info/', {
		            method: 'GET',
		            headers: {
		                'Authorization': 'Bearer ' + accessToken
		            }
		        });
		        const result = await response.json();
		        if (result.code === 200 && result.data.username === 'admin') {
		            document.getElementById('btnImport').style.display = 'inline-block';
		        }
		    } catch (e) {
		        console.error('获取用户信息失败', e);
		    }
		}
        checkAuth();
    </script>

</body>
</html>
